version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mordomo-mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - mordomo

  ollama:
    image: ollama/ollama:latest
    container_name: mordomo-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mordomo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mordomo-backend
    restart: always
    volumes:
      - voice_models:/app/voice_models
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "mordomo_db"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@mordomo.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:32b}"
      BACKEND_URL: "https://mordomo.virtual.grupomafort.com"
      WHISPER_MODEL: "${WHISPER_MODEL:-large-v3-turbo}"
      WHISPER_COMPUTE: "${WHISPER_COMPUTE:-int8}"
      PIPER_VOICE: "${PIPER_VOICE:-pt_BR-faber-medium}"
    depends_on:
      - mongodb
      - ollama
    networks:
      - mordomo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: "https://mordomo.virtual.grupomafort.com"
    container_name: mordomo-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - mordomo

  nginx:
    image: nginx:alpine
    container_name: mordomo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mordomo

  certbot:
    image: certbot/certbot
    container_name: mordomo-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - mordomo

volumes:
  mongo_data:
  ollama_data:
  certbot_conf:
  certbot_www:
  voice_models:

networks:
  mordomo:
    driver: bridge
