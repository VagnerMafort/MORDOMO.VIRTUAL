version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: mordomo-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mordomo_db

  # Ollama (LLM local)
  ollama:
    image: ollama/ollama:latest
    container_name: mordomo-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Para GPU (descomente se tiver):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mordomo-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "mordomo_db"
      JWT_SECRET: "${JWT_SECRET:-a1b2c3d4e5f6789012345678901234567890abcdef1234567890}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@mordomo.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:32b}"
      BACKEND_URL: "${BACKEND_URL:-http://localhost:8001}"
    depends_on:
      - mongodb
      - ollama

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: "${BACKEND_URL:-http://localhost:8001}"
    container_name: mordomo-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # Nginx (reverse proxy) - optional, for production with SSL
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/ssl

volumes:
  mongo_data:
  ollama_data:
